# =============================================================================
# docker-compose.yml - Media Intelligence Engine
# =============================================================================

version: "3.9"

services:
  api:
    build:
      context: .
    image: mie-api:latest
    container_name: mie-api
    env_file:
      - .env
    # Sin `ports`: el contenedor NO publica al host. Traefik (coolify-proxy)
    # enruta mie.gargurevich.dev por la red interna `coolify`.
    networks:
      - coolify
    volumes:
      - ./data:/data
      # cookies.txt (Netscape) para descargas autenticadas (Instagram, YouTube, etc.).
      # Vive en la carpeta del repo en el VPS, NUNCA se commitea (ver .gitignore).
      # DEBE existir el archivo antes de `up`, si no Docker crea un directorio.
      - ./cookies.txt:/app/cookies.txt:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - "traefik.http.routers.mie-http.rule=Host(`mie.gargurevich.dev`)"
      - traefik.http.routers.mie-http.entryPoints=http
      - traefik.http.routers.mie-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - "traefik.http.routers.mie-https.rule=Host(`mie.gargurevich.dev`)"
      - traefik.http.routers.mie-https.entryPoints=https
      - traefik.http.routers.mie-https.tls=true
      - traefik.http.routers.mie-https.tls.certresolver=letsencrypt
      - traefik.http.services.mie-svc.loadbalancer.server.port=8000
    restart: unless-stopped

